<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>D4JSP — Sanctuary Map</title>

  <!-- Google Fonts: Cinzel + Barlow Condensed + IM Fell (ink-on-paper script for in-scroll menu) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Barlow+Condensed:wght@300;400;500;600&family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Italianno&display=swap" rel="stylesheet" />

  <!-- Leaflet CSS from CDN -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <!-- Phase Y.8/Y.10: square shell pinned to top of viewport. The brand
       frame is positioned absolutely within the shell so it does NOT pan
       with the map. Layer panel is also inside the shell now, baked into
       the parchment scroll in the top-left of the frame. -->
  <div id="map-shell">
    <div id="map"></div>
    <!-- Y.18 (Adam: it was working properly with the gold border): brand-frame
         is back INSIDE map-shell as a sibling of #map. position:absolute inset:0
         inside the position:fixed shell — exactly the same anchoring as the
         Y.14 CSS gold border that worked. Layer panel hides on zoom-in. -->
    <div id="brand-frame"></div>

  <!-- Panel reopen button (legacy, hidden via CSS) -->
  <button id="panel-toggle-btn" title="Show layer controls">&#9776;</button>

  <!-- Y.34f: hamburger anchored to the left of the zoom buttons. Tapping
       fitBounds the scroll/menu so the user can jump back from a zoomed
       map view. Positioned in #map-shell so it sits inside the frame. -->
  <button id="menu-jump-btn" title="Jump to menu" aria-label="Jump to menu">&#9776;</button>

  <!-- Y.34 (Adam): in-scroll menu. Anchored via JS to the parchment scroll
       graphic in the brand frame so it pans/zooms WITH the map. Y.34c
       layout: search bar full-width at top, then below it a 2-column
       row: left = tabs + tab content, right = My Waypoints (independent
       of which tab is active). -->
  <div id="scroll-menu">
    <div id="scroll-menu-inner">

      <!-- Search row (full width) -->
      <div class="scroll-search">
        <svg class="scroll-search-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="10.5" cy="10.5" r="6.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <line x1="15.5" y1="15.5" x2="20" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input id="search-input" type="text" placeholder="search…" autocomplete="off" spellcheck="false" />
        <button id="search-clear" title="Clear">&times;</button>
      </div>

      <div class="scroll-divider"></div>

      <!-- 2-column body: left = tabs + tab content, right = waypoints (independent of tabs) -->
      <div class="scroll-body">
        <!-- Left column -->
        <div id="scroll-menu-left">
          <div class="scroll-tabs">
            <button class="scroll-tab active" data-tab="layers">Layers</button>
            <button class="scroll-tab" data-tab="bosses">Bosses</button>
            <button class="scroll-tab" data-tab="builds">Builds</button>
          </div>
          <div class="scroll-divider"></div>
          <div id="tab-layers" class="scroll-tab-content">
            <div id="layer-list"></div>
          </div>
          <div id="tab-bosses" class="scroll-tab-content hidden">
            <div class="scroll-coming-soon">boss rotation — coming soon</div>
          </div>
          <div id="tab-builds" class="scroll-tab-content hidden">
            <div id="builds-list"></div>
          </div>
        </div>

        <!-- Right column: custom waypoints — same row level as tabs -->
        <div id="scroll-menu-right">
          <div class="scroll-section-title">
            My Waypoints
            <button id="add-waypoint-btn" title="Add waypoint" aria-label="Add waypoint">+</button>
          </div>
          <div class="scroll-divider"></div>
          <div id="custom-waypoints-list">
            <div class="scroll-empty">right-click map<br/>to save a spot</div>
          </div>
        </div>
      </div>

      <!-- Search results dropdown (overlays inside the scroll) -->
      <div id="search-results"></div>
    </div>
  </div>

  <!-- Legacy elements kept for back-compat with main.js / search.js / planner.js -->
  <div id="layer-panel" style="display:none">
    <button id="panel-close-btn" style="display:none"></button>
    <button id="btn-plan-builds" style="display:none"></button>
    <button id="btn-all-on" style="display:none"></button>
    <button id="btn-all-off" style="display:none"></button>
    <button id="btn-new-build" style="display:none"></button>
  </div>

  <!-- Build Planner Modal -->
  <div id="planner-modal">
    <div id="planner-panel">
      <div class="planner-header">
        <span class="planner-title">BUILD PLANNER</span>
        <button id="planner-close" class="planner-close-btn">&#10005;</button>
      </div>

      <!-- List View: saved builds -->
      <div id="planner-list-view">
        <div id="planner-builds"></div>
        <div class="planner-list-footer">
          <button id="planner-new-btn" class="panel-btn planner-new-btn">+ New Build</button>
        </div>
      </div>

      <!-- Form View: create / edit a build -->
      <div id="planner-form-view" class="hidden">
        <div id="planner-form-title" class="planner-section-title">NEW BUILD</div>
        <div class="planner-field">
          <label class="planner-label">Build Name</label>
          <input id="planner-name-input" type="text" class="planner-input" placeholder="e.g. Necro Bone Spear S4" />
        </div>
        <div class="planner-field">
          <label class="planner-label">
            Dungeon Rotation
            <span id="planner-selected-count" class="planner-count-badge"></span>
          </label>
          <input id="planner-dungeon-filter" type="text" class="planner-input" placeholder="Filter dungeons..." />
        </div>
        <div id="planner-dungeon-list" class="planner-dungeon-list"></div>
        <div class="planner-form-footer">
          <button id="planner-back-btn" class="panel-btn">&larr; Back</button>
          <button id="planner-save-btn" class="panel-btn planner-save-btn">Save Build</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Y.34: search/coords moved into in-scroll menu — old top-right panel removed. -->
  <div id="coords-display" style="display:none"><span id="coords-text"></span></div>

  </div><!-- /#map-shell -->

  <!-- Leaflet JS from CDN -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
